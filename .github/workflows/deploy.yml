name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'   # Sirf tab deploy ho jab src/ mein koi change ho

jobs:
  deploy:
    name: Deploy FMR Downloader
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout karo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Python setup karo
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # Step 3: AWS credentials configure karo
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # Step 4: Lambda ke liye ZIP banao
      - name: Create deployment ZIP
        run: |
          cd src
          zip -r ../deployment.zip lambda_function.py
          echo "✅ ZIP created!"

      # Step 5: Lambda pe deploy karo
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name fmr-downloader \
            --zip-file fileb://deployment.zip
          echo "✅ Deployed to Lambda!"

      # Step 6: Verify deployment
      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name fmr-downloader \
            --query 'Configuration.LastModified' \
            --output text
          echo "✅ Deployment verified!"
